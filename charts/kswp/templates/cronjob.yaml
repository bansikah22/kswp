apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kswp.fullname" . }}
  labels:
    {{- include "kswp.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "kswp.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "kswp.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                {{- toYaml .Values.args | nindent 16 }}
